name: Build Android APK

# 纯云端打包：无需本地安装 Node / Android Studio。
# 在 GitHub 网页 Actions 标签页手动运行，填上你的服务器地址即可。
on:
  workflow_dispatch:
    inputs:
      server_url:
        description: "服务器地址（数据共通）。例：http://120.27.249.73:4000（公网）或 http://172.22.139.18:4000（内网）。留空=单包双模式（App 内设置里可随时连服务器）"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: "1"
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22   # Capacitor 8 CLI 要求 Node >= 22
      - run: npm ci

      - name: Build web assets
        run: npm run build:static

      # 若填了服务器地址：让 App 直接连你的服务器（与网页共用同一数据库）。
      - name: Point app at your server (data sync)
        if: ${{ github.event.inputs.server_url != '' }}
        env:
          SERVER_URL: ${{ github.event.inputs.server_url }}
        run: |
          node -e '
            const fs = require("fs");
            const p = "capacitor.config.json";
            const c = JSON.parse(fs.readFileSync(p, "utf8"));
            const url = process.env.SERVER_URL.trim();
            c.server = c.server || {};
            c.server.androidScheme = c.server.androidScheme || "https";
            c.server.url = url;
            if (url.startsWith("http://")) c.server.cleartext = true;
            fs.writeFileSync(p, JSON.stringify(c, null, 2));
            console.log("App will load from:", url);
          '

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"   # Capacitor 8 的安卓库用 Java 21 编译，需 JDK 21

      - name: Generate Android project
        run: npx cap add android

      # 允许明文 HTTP：App 内「设置 → 服务器连接」可指向 http://IP:端口 的自建服务器
      # （内网 172.22.139.18 / 公网 120.27.249.73 等无 TLS 证书的裸 IP 部署）。
      # capacitor.config.json 已设 cleartext + allowMixedContent，这里再补 manifest
      # 的 usesCleartextTraffic，三者齐备才能保证各 Android 版本的 WebView 都放行。
      - name: Allow cleartext HTTP in Android manifest
        run: |
          M=android/app/src/main/AndroidManifest.xml
          grep -q 'usesCleartextTraffic' "$M" || sed -i 's/<application /<application android:usesCleartextTraffic="true" /' "$M"
          grep -o '<application[^>]*' "$M" | head -1

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      # 品牌启动器图标 + 启动屏：从 resources/ 里的官方图标源生成安卓全套
      # mipmap（含自适应图标前景/背景）。没有这一步 APK 会顶着 Capacitor 默认图标。
      - name: Generate launcher icons & splash
        run: |
          npm i -D --no-save @capacitor/assets
          npx capacitor-assets generate --android --assetPath resources \
            --iconBackgroundColor '#211c3f' --iconBackgroundColorDark '#211c3f' \
            --splashBackgroundColor '#1b1733' --splashBackgroundColorDark '#15120e'

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: huanyu-app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
