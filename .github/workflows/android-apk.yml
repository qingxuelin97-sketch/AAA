name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      server_url:
        description: "正式后端 HTTPS 地址，例如 https://api.example.com"
        required: true
        type: string
      play_cloud_project_number:
        description: "已启用 Play Integrity 的 Google Cloud 项目编号"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: "1"
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      VITE_API_BASE: ${{ inputs.server_url }}
      PLAY_INTEGRITY_CLOUD_PROJECT_NUMBER: ${{ inputs.play_cloud_project_number }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Validate HTTPS and configure native security
        run: node scripts/configure-android.mjs --before

      - name: Build bundled web assets
        run: npm run build:static

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Generate Android project
        run: npx cap add android

      - name: Install Play Integrity bridge and deny cleartext
        run: node scripts/configure-android.mjs --after

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Generate launcher icons and splash
        run: |
          npm i -D --no-save @capacitor/assets
          npx capacitor-assets generate --android --assetPath resources \
            --iconBackgroundColor '#211c3f' --iconBackgroundColorDark '#211c3f' \
            --splashBackgroundColor '#1b1733' --splashBackgroundColorDark '#15120e'

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: huanyu-app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
