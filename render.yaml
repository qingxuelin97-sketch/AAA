# Render.com 蓝图：一键部署幻域全栈服务（Express API + SQLite + 前端）
# 用法：在 Render 新建 Blueprint，指向本仓库；或参考此配置部署到任意支持 Docker 的平台。
services:
  - type: web
    name: huanyu
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Render 流量必经平台反代：信任 1 跳才能从 X-Forwarded-For 还原真实客户端 IP，
      # 否则按 IP 的限流/注册配额/登录锁定全部退化为共享代理 IP（详见 server/index.js）。
      - key: TRUST_PROXY
        value: "1"
      - key: DB_PATH
        value: /data/data.sqlite
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: huanyu-data
      mountPath: /data
      sizeGB: 1
