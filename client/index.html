<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <!-- interactive-widget=resizes-content：软键盘弹起时让布局视口随之收缩，
         配合 100dvh 与 fixed 输入栏，使输入框天然贴合键盘上沿（详见 src/mobile.js）。 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#f4f2ec" />
    <title>幻域 · AI 角色扮演平台</title>
    <meta name="description" content="自定义角色、世界书、好感度与对话记忆，与你创造的角色沉浸对话。" />
    <!-- 内容安全策略：默认同源，限制脚本/样式来源，降低 XSS 与供应链风险 -->
    <!-- frame-ancestors 在 <meta> 里按规范会被忽略且每页刷 console 报错，故不写；
         防嵌套由服务端 helmet 的 X-Frame-Options 承担。 -->
    <!-- 为完整兼容酒馆(SillyTavern)角色卡自带的 HTML 前端（面板经 blob: iframe 渲染，
         blob 文档【继承】本页 CSP），必须放行：
           · frame-src blob:/data: —— 否则面板 iframe 直接 net::ERR_BLOCKED_BY_CSP
           · script-src 'unsafe-inline' 'unsafe-eval' https: blob: —— 面板内联脚本 + CDN 库（dexie/leancloud/fontawesome 等）
           · style-src/font-src https: —— Google Fonts 等外链字体样式
         取舍与 SillyTavern 一致（酒馆本身不设 CSP）；面板仍受 iframe sandbox 约束。 -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob: https: http:; media-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline' https:; font-src 'self' data: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https: blob:; connect-src 'self' https: wss: blob: data:; frame-src 'self' blob: data:; child-src 'self' blob: data:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'" />

    <!-- PWA / installable app -->
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="幻域" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="icons/favicon-512.png" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23dd8662'/%3E%3Cstop offset='1' stop-color='%23b3522f'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='40' height='40' rx='9' fill='url(%23g)'/%3E%3Ccircle cx='19' cy='20' r='9.5' fill='%23fff'/%3E%3Ccircle cx='23.5' cy='17.5' r='8.2' fill='url(%23g)'/%3E%3Cpath d='M27.4 23.2l.7 2 2 .7-2 .7-.7 2-.7-2-2-.7 2-.7z' fill='%23fff'/%3E%3C/svg%3E" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
